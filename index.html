<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista não ordenada</title>
</head>
<body>
    <div>
        <h1> Lista não ordenada</h1>
        <ul>
             <li type="circle">Café</li>
             <li type="circle">Chá</li>
             <li type="circle">Coca cola</li>
 
        </ul> 
    </div>
   <div>
        <ul>
            <li>Café</li>
            <li>Chá</li>
            <li>Coca cola</li>
        </ul>
   </div>
    
   <div>
    <h1> Listas solicitadas</h1>
    <ol>
        <li>Café</li>
        <li>Chá</li>
        <li>Coca cola</li>
    </ol>
   </div>

   <div>
    <ol type="I">
        <li>Café</li>
        <li>Chá</li>
        <li>Coca cola</li>
    </ol>
   </div>  

</body>
</html>
